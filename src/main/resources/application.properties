spring.application.name=ProjectBifrost
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=poolside/laguna-xs.2:free

resilience4j.circuitbreaker.instances.externalService.sliding-window-size=5
resilience4j.circuitbreaker.instances.externalService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.externalService.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.externalService.wait-duration-in-open-state=5s
resilience4j.retry.instances.externalService.max-attempts=3
resilience4j.circuitbreaker.circuitBreakerAspectOrder=1
resilience4j.retry.retryAspectOrder=2